<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F4F9FF"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="330" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#143C5A"/>
      <stop offset="1" stop-color="#1E6F92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="340" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F9FCFF"/>
    </linearGradient>
    <filter id="drop" x="0" y="0" width="390" height="844" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0A2B42" flood-opacity="0.08"/>
    </filter>
    <style>
      .h1 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 22px; font-weight: 700; fill: #122332; }
      .h2 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 14px; font-weight: 700; fill: #1A3C4C; }
      .b1 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 12px; font-weight: 500; fill: #5A7485; }
      .b2 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 11px; font-weight: 700; fill: #2B5265; }
      .w { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 14px; font-weight: 700; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <circle cx="40" cy="63" r="20" fill="#FFFFFF" stroke="#D8E5ED"/>
  <path d="M46 63H34M34 63L39 58M34 63L39 68" stroke="#2A4C5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="68" class="h1">New Session</text>
  <text x="72" y="90" class="b1">Workspace: Japanese • Mode: Import Audio</text>
  <text x="72" y="108" class="b1">Switch mode to "Create from Text" for TTS generation.</text>

  <rect x="264" y="48" width="102" height="30" rx="15" fill="#E7F3ED"/>
  <text x="286" y="67" class="b2" fill="#2A6A47">Key valid</text>

  <text x="24" y="124" class="h2">Pipeline (Import Audio)</text>
  <line x1="44" y1="141" x2="346" y2="141" stroke="#CDDEE8" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="141" x2="220" y2="141" stroke="#1B6A8B" stroke-width="4" stroke-linecap="round"/>

  <circle cx="44" cy="141" r="12" fill="#1B6A8B"/>
  <text x="38" y="145" class="w" style="font-size:10px;">1</text>
  <circle cx="132" cy="141" r="12" fill="#1B6A8B"/>
  <text x="126" y="145" class="w" style="font-size:10px;">2</text>
  <circle cx="220" cy="141" r="12" fill="#FFFFFF" stroke="#1B6A8B" stroke-width="2"/>
  <text x="214" y="145" class="b2">3</text>
  <circle cx="308" cy="141" r="12" fill="#FFFFFF" stroke="#B8CCD8" stroke-width="2"/>
  <text x="302" y="145" class="b1">4</text>

  <text x="26" y="168" class="b2">Import</text>
  <text x="112" y="168" class="b2">Upload</text>
  <text x="200" y="168" class="b2">Transcribe</text>
  <text x="284" y="168" class="b1">Sentences</text>

  <g filter="url(#drop)">
    <rect x="22" y="186" width="346" height="182" rx="24" fill="url(#card)"/>
  </g>
  <text x="40" y="218" class="h2">Source input</text>
  <rect x="40" y="232" width="310" height="120" rx="16" fill="#F2F8FD" stroke="#CFE0EC" stroke-dasharray="7 6"/>

  <circle cx="88" cy="292" r="28" fill="#DCEAF5"/>
  <path d="M88 278V306M74 292H102" stroke="#1B6A8B" stroke-width="2.8" stroke-linecap="round"/>
  <text x="130" y="286" class="h2">Select Audio File</text>
  <text x="130" y="307" class="b1">Import m4a/mp3/wav or switch to Text mode</text>

  <g filter="url(#drop)">
    <rect x="22" y="384" width="346" height="96" rx="22" fill="url(#card)"/>
  </g>
  <text x="40" y="414" class="b1">Selected file</text>
  <text x="40" y="438" class="h2">japanese_dialog_12min.m4a</text>
  <rect x="280" y="406" width="70" height="24" rx="12" fill="#E8F3EA"/>
  <text x="300" y="422" class="b2" fill="#2D6A48">34 MB</text>

  <g filter="url(#drop)">
    <rect x="22" y="496" width="346" height="100" rx="22" fill="url(#card)"/>
  </g>
  <text x="40" y="526" class="b1">Session title</text>
  <rect x="40" y="536" width="310" height="38" rx="12" fill="#F5FAFE" stroke="#CDDEE8"/>
