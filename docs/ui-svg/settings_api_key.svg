  <rect x="300" y="554" width="40" height="24" rx="12" fill="#0F6775"/>
  <circle cx="327" cy="566" r="9" fill="#FFFFFF"/>

  <g filter="url(#drop)">
    <rect x="22" y="624" width="346" height="172" rx="24" fill="url(#card)"/>
  </g>
  <text x="40" y="658" class="h2">About</text>
  <rect x="40" y="674" width="310" height="42" rx="12" fill="#F3F9FC" stroke="#CEE1EA"/>
  <text x="54" y="700" class="b2">Version 1.0 demo</text>

  <rect x="40" y="726" width="310" height="54" rx="18" fill="#EAF0F5"/>
  <text x="98" y="758" class="h2">Privacy: API key in Keychain</text>
