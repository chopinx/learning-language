<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FCFF"/>
      <stop offset="1" stop-color="#F6FAF8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="340" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FAFDFF"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="120" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#143E59"/>
      <stop offset="1" stop-color="#0E6B75"/>
    </linearGradient>
    <filter id="drop" x="0" y="0" width="390" height="844" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0A2B42" flood-opacity="0.08"/>
    </filter>
    <style>
      .h1 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 22px; font-weight: 700; fill: #112332; }
      .h2 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 14px; font-weight: 700; fill: #183B4A; }
      .b1 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 12px; font-weight: 500; fill: #5B7484; }
      .b2 { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 11px; font-weight: 700; fill: #2D5262; }
      .w { font-family: 'Sora', 'Avenir Next', sans-serif; font-size: 12px; font-weight: 700; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <circle cx="40" cy="63" r="20" fill="#FFFFFF" stroke="#D8E5EC"/>
  <path d="M46 63H34M34 63L39 58M34 63L39 68" stroke="#2B4E5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="68" class="h1">Settings</text>

  <g filter="url(#drop)">
    <rect x="22" y="110" width="346" height="300" rx="24" fill="url(#card)"/>
  </g>
  <text x="40" y="144" class="h2">Deepgram API Key</text>
  <text x="40" y="165" class="b1">Used for source and recording transcription</text>

  <rect x="40" y="182" width="310" height="56" rx="14" fill="#F4FAFD" stroke="#CEE1EA"/>
  <text x="54" y="214" class="b2">dg_live_••••••••••••••••••A7mQ</text>

  <rect x="40" y="250" width="94" height="38" rx="19" fill="url(#primary)"/>
  <text x="67" y="274" class="w">Save</text>
  <rect x="142" y="250" width="108" height="38" rx="19" fill="#1A5F84"/>
  <text x="168" y="274" class="w">Validate</text>
  <rect x="258" y="250" width="92" height="38" rx="19" fill="#E8EFF4"/>
  <text x="284" y="274" class="b2">Clear</text>

  <rect x="40" y="304" width="310" height="88" rx="14" fill="#EAF6EE" stroke="#CFE6D6"/>
  <circle cx="66" cy="336" r="10" fill="#2B8A53"/>
  <path d="M61 336L64 339L71 332" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="333" class="h2" fill="#236947">Key validated successfully</text>
  <text x="84" y="353" class="b1" fill="#3C7A59">Last checked: 22:14</text>
  <text x="84" y="372" class="b1" fill="#3C7A59">Transcription actions are enabled</text>

  <g filter="url(#drop)">
    <rect x="22" y="426" width="346" height="182" rx="24" fill="url(#card)"/>
  </g>
  <text x="40" y="460" class="h2">Language Workspace</text>
  <text x="40" y="480" class="b1">Data is isolated per language (sessions, progress, attempts)</text>

  <rect x="40" y="496" width="76" height="30" rx="15" fill="#EAF0F5"/>
  <text x="60" y="515" class="b2">English</text>
  <rect x="124" y="496" width="80" height="30" rx="15" fill="#EAF0F5"/>
  <text x="146" y="515" class="b2">Spanish</text>
  <rect x="212" y="496" width="88" height="30" rx="15" fill="#0F6775"/>
  <text x="235" y="515" class="w">Japanese</text>
  <rect x="308" y="496" width="42" height="30" rx="15" fill="#EAF0F5"/>
  <text x="320" y="515" class="b2">+</text>

  <rect x="40" y="540" width="310" height="54" rx="14" fill="#F3F9FC" stroke="#CEE1EA"/>
