  <g filter="url(#drop)">
    <rect x="22" y="612" width="346" height="136" rx="22" fill="url(#card)"/>
  </g>
  <text x="40" y="644" class="h2">Current progress</text>
  <text x="40" y="666" class="b1">Uploading audio to Deepgram...</text>
  <rect x="40" y="680" width="310" height="12" rx="6" fill="#D8E6EF"/>
  <rect x="40" y="680" width="184" height="12" rx="6" fill="#1B6A8B"/>
  <text x="316" y="694" class="b2">58%</text>

  <rect x="32" y="768" width="326" height="56" rx="28" fill="url(#primary)"/>
  <text x="114" y="802" class="w">Transcribe / Generate</text>
</svg>
